name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: 'asia-south1'
  SERVICE: "resource-iq-be"
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WIF_PROVIDER }}

jobs:
  jobs:
  build-test:
    name: 'Build and Verify'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v4'

      - name: 'Test Docker Build'
        run: docker build . -t test-build

  deploy:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          token_format: 'access_token'

      - name: 'Docker Auth'
        run: |-
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: 'Build and Push Container'
        run: |-
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app"

          docker build -t "$IMAGE_BASE:${{ github.sha }}" -t "$IMAGE_BASE:latest" .

          docker push "$IMAGE_BASE:${{ github.sha }}"
          docker push "$IMAGE_BASE:latest"

      - name: 'Deploy to Cloud Run'
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app:${{ github.sha }}'
          flags: >-
            --allow-unauthenticated
            --cpu=2
            --memory=8Gi
            --min-instances=0
            --max-instances=10
            --concurrency=80

      - name: 'Create or Update Migration Job'
        run: |-
          gcloud run jobs deploy resource-iq-prestart \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app:latest \
            --command "/bin/bash" \
            --args "scripts/prestart.sh" \
            --region ${{ env.REGION }} \
            --set-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:resource-iq \
            --set-env-vars "PROJECT_NAME=ResourceIQ,FIRST_SUPERUSER=${{ secrets.FIRST_SUPERUSER }},FIRST_SUPERUSER_PASSWORD=${{ secrets.FIRST_SUPERUSER_PASSWORD }},CLOUD_SQL_CONNECTION_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:resource-iq"

      - name: 'Run Migrations'
        run: |-
          gcloud run jobs execute resource-iq-prestart \
            --region ${{ env.REGION }} \
            --wait

      - name: 'Show output'
        run: echo ${{ steps.deploy.outputs.url }}
