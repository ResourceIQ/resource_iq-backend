name: Test Backend

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ResourceIQ Test
      SECRET_KEY: test-secret-key-for-ci
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      POSTGRES_SERVER: localhost
      ENVIRONMENT: local
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.0"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/services/ -v --tb=short --confcutdir=tests/services --cov=app.api --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-coverage
          path: htmlcov
          include-hidden-files: true

