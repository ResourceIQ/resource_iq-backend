name: resource-iq-be

x-google-backend:
  serviceAccount: ${SERVICE_ACCOUNT_EMAIL}

services:
  resource-iq:
    image: "${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}"
    ports:
      - "8080"
    depends_on:
      - redis
      - cloud-sql-proxy
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY}
      - PROJECT_NAME=${PROJECT_NAME}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}

      # --- DATABASE CONNECTION UPDATES ---
      - POSTGRES_SERVER=127.0.0.1
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SSL_MODE=${POSTGRES_SSL_MODE}
      # -----------------------------------

      - SENTRY_DSN=${SENTRY_DSN}
      - SMTP_TLS=${SMTP_TLS}
      - SMTP_SSL=${SMTP_SSL}
      - SMTP_PORT=${SMTP_PORT}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_APP_SLUG=${GITHUB_APP_SLUG}
      - JINA_API_KEY=${JINA_API_KEY}
      - JINA_API_URL=${JINA_API_URL}
      - JINA_EMBEDDING_MODEL1=${JINA_EMBEDDING_MODEL1}
      - JINA_EMBEDDING_MODEL2=${JINA_EMBEDDING_MODEL2}
      - USE_JINA_API=${USE_JINA_API}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - ATLASSIAN_CLIENT_ID=${ATLASSIAN_CLIENT_ID}
      - ATLASSIAN_CLIENT_SECRET=${ATLASSIAN_CLIENT_SECRET}
      - ATLASSIAN_REDIRECT_URI=${ATLASSIAN_REDIRECT_URI}
      - NEO4J_SCHEME=${NEO4J_SCHEME}
      - NEO4J_HOST=${NEO4J_HOST}
      - NEO4J_PORT=${NEO4J_PORT}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE}
      - AURA_INSTANCEID=${AURA_INSTANCEID}
      - AURA_INSTANCENAME=${AURA_INSTANCENAME}
      # Notice I removed CLOUD_SQL_CONNECTION_NAME from the app's environment block.
      # See the warning below as to why!

      - REDIS_HOST=127.0.0.1 # Changed from localhost to 127.0.0.1 to be safe
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB}
      - TASK_STATUS_TTL_SECONDS=${TASK_STATUS_TTL_SECONDS}
      - WEB_CONCURRENCY=2
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    x-google-cloudrun:
      ingress-container: true
      cpu-throttling: false
      container-port: 8080
      concurrency: 80

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --port
      - "6379"

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.21.2
    ports:
      - "5432:5432"
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "${CLOUD_SQL_CONNECTION_NAME}"
